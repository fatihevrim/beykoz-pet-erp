<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/streamlit-component-lib@1.3.0/dist/streamlit.js" type="text/javascript"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e14;
            color: #f0f3f8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            background-color: #0b0e14;
            border: 1px solid rgba(0, 173, 181, 0.2);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-sizing: border-box;
        }
        #reader {
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }
        #status {
            margin-top: 10px;
            font-size: 0.9em;
            color: #a7f3d0;
        }
        button {
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            font-size: 1.1em;
            box-sizing: border-box;
        }
        #start-btn {
            background: linear-gradient(135deg, #00adb5 0%, #00f2fe 100%);
            color: #000;
        }
        #stop-btn {
            background: #ef4444;
            color: #fff;
            display: none;
        }
        #copy-btn {
            background: #4b5563;
            color: #fff;
            display: none;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="reader"></div>
        <div id="status">📷 Kamera hazır. Taramak için başlatın.</div>
        <button id="start-btn">📷 Kamerayı Başlat</button>
        <button id="stop-btn">🛑 Kamerayı Kapat</button>
        <button id="copy-btn">📋 Barkodu Kopyala</button>
    </div>

    <script>
        const startBtn = document.getElementById("start-btn");
        const stopBtn = document.getElementById("stop-btn");
        const copyBtn = document.getElementById("copy-btn");
        const statusDiv = document.getElementById("status");
        let html5QrCode = null;
        let lastScannedText = "";

        // Notify Streamlit height on load
        window.addEventListener("load", () => {
            if (window.Streamlit) {
                Streamlit.setFrameHeight(document.body.scrollHeight + 10);
            }
        });

        copyBtn.addEventListener("click", () => {
            if (lastScannedText) {
                navigator.clipboard.writeText(lastScannedText).then(() => {
                    statusDiv.innerText = "📋 Kopyalandı: " + lastScannedText;
                }).catch(err => {
                    statusDiv.innerText = "❌ Kopyalama başarısız.";
                });
            }
        });

        startBtn.addEventListener("click", () => {
            statusDiv.innerText = "🔄 Kamera başlatılıyor...";
            startBtn.style.display = "none";
            stopBtn.style.display = "block";
            
            html5QrCode = new Html5Qrcode("reader");
            
            const config = { 
                fps: 20, 
                qrbox: { width: 250, height: 150 },
                aspectRatio: 1.777778
            };
            
            const videoConstraints = {
                facingMode: "environment",
                advanced: [{ focusMode: "continuous" }]
            };
            
            const successCallback = (decodedText, decodedResult) => {
                statusDiv.innerText = "✅ Barkod Algılandı: " + decodedText;
                lastScannedText = decodedText;
                copyBtn.style.display = "block";
                
                // Vibrate feedback
                if (navigator.vibrate) {
                    navigator.vibrate(100);
                }
                
                // Send value to Streamlit directly (native & CORS safe!)
                if (window.Streamlit) {
                    Streamlit.setComponentValue(decodedText);
                }
                
                html5QrCode.stop().then(() => {
                    statusDiv.innerText = "✅ Barkod Aktarıldı: " + decodedText;
                    startBtn.style.display = "block";
                    stopBtn.style.display = "none";
                }).catch(err => {
                    console.error("Stop failed:", err);
                });
            };
            
            html5QrCode.start(videoConstraints, config, successCallback)
                .catch((err) => {
                    console.warn(err);
                    html5QrCode.start({ facingMode: "user" }, config, successCallback)
                        .then(() => { statusDiv.innerText = "📷 Ön kamera aktif. Barkodu yaklaştırın."; })
                        .catch((err2) => {
                            statusDiv.innerText = "❌ Kamera izin engeli! Lütfen tarayıcı ayarlarından kameraya izin verin.";
                            startBtn.style.display = "block";
                            stopBtn.style.display = "none";
                        });
                });
        });

        stopBtn.addEventListener("click", () => {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    statusDiv.innerText = "🛑 Kamera kapatıldı.";
                    startBtn.style.display = "block";
                    stopBtn.style.display = "none";
                    copyBtn.style.display = "none";
                });
            }
        });
    </script>
</body>
</html>
